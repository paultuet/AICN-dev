# fly.toml app configuration file generated for aicn-app on 2025-04-17T10:41:29+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'aicn-app'
primary_region = 'cdg'

[build]
  dockerfile = 'packages/backend/Dockerfile'

[env]
  DB_HOST = 'aws-0-eu-west-3.pooler.supabase.com'
  DB_NAME = 'postgres'
  DB_PASSWORD = 'BRc8n$7bzU'
  DB_PORT = '5432'
  DB_USER = 'postgres.yaskxhahopdeearpjlhw'
  PORT = '8080'
  SSL_MODE = 'require'

[http_service]
  internal_port = 1337
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[services]]
  protocol = ''
  internal_port = 0

  [[services.ports]]
    port = 80
    handlers = ['http']
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ['tls', 'http']

  [services.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[services.tcp_checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '1s'

  [[services.http_checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '5s'
    method = 'get'
    path = '/api/health'
    protocol = 'http'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
