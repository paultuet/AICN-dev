services:
  # Application unifiée (backend servant aussi le frontend)
  unified-app:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    container_name: aicn-unified
    environment:
      PORT: 1337
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      SSL_MODE: ${SSL_MODE}
    ports:
      - "1337:1337"
    networks:
      - aicn-network

networks:
  aicn-network:
    driver: bridge