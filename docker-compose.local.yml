services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: aicn-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aicn_db
    ports:
      - "5439:5432"
    volumes:
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aicn-network

  # Backend Clojure application
  backend:
    build:
      context: ./packages/backend
    container_name: aicn-backend
    environment:
      PORT: 1337
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: aicn_db
      SSL_MODE: disable
    ports:
      - "1337:1337"
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - aicn-network
    
  # Service pour initialiser la base de données
  db-init:
    image: postgres:15-alpine
    container_name: aicn-db-init
    environment:
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: aicn_db
      PGHOST: postgres
    volumes:
      - ./scripts/init-db.sql:/init-db.sql
    command: >
      sh -c "
        # Attendez que PostgreSQL soit prêt
        until pg_isready -h postgres -U postgres; do
          echo 'Waiting for PostgreSQL to be ready...'
          sleep 1
        done
        echo 'PostgreSQL is ready! Executing initialization script...'
        # Exécutez le script d'initialisation
        psql -f /init-db.sql
        echo 'Initialization script executed!'
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aicn-network

  # Frontend React application
  frontend:
    build:
      context: ./packages/frontend
    container_name: aicn-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
      - db-init
    networks:
      - aicn-network

networks:
  aicn-network:
    driver: bridge