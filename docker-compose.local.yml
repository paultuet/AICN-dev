services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: aicn-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aicn_db
    ports:
      - "5439:5432"
    volumes:
      - ./scripts:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Clojure application
  backend:
    build:
      context: ./packages/backend
    container_name: aicn-backend
    environment:
      PORT: 1337
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: aicn_db
      SSL_MODE: disable
    ports:
      - "1337:1337"
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend React application
  frontend:
    build:
      context: ./packages/frontend
    container_name: aicn-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

