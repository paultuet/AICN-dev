services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: aicn-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aicn_db
    ports:
      - "5439:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aicn-network

  # Backend Clojure application
  backend:
    build:
      context: ./packages/backend
    container_name: aicn-backend
    environment:
      PORT: 1337
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      SSL_MODE: disable
      VIRTUAL_HOST: api.bisou.finance
      VIRTUAL_PORT: 1337
      LETSENCRYPT_HOST: api.bisou.finance
    expose:
      - "1337"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aicn-network

  # Frontend React application
  frontend:
    build:
      context: ./packages/frontend
    container_name: aicn-frontend
    environment:
      VIRTUAL_HOST: bisou.finance,www.bisou.finance
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: bisou.finance,www.bisou.finance
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - aicn-network

  # Reverse proxy with SSL
  nginx-proxy:
    image: nginxproxy/nginx-proxy
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/tmp/docker.sock:ro
      - certs:/etc/nginx/certs
      - vhost:/etc/nginx/vhost.d
      - html:/usr/share/nginx/html
    networks:
      - aicn-network

  # Let's Encrypt companion
  letsencrypt:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    volumes_from:
      - nginx-proxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - acme:/etc/acme.sh
    environment:
      DEFAULT_EMAIL: carvalho.thomas@gmail.com
    depends_on:
      - nginx-proxy
    networks:
      - aicn-network

volumes:
  postgres-data:
  certs:
  vhost:
  html:
  acme:

networks:
  aicn-network:
    driver: bridge