services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: aicn-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aicn_db
      # Force script execution
      POSTGRES_INITDB_ARGS: "--data-checksums"
    ports:
      - "5439:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aicn-network

  # Service pour initialiser la base de données
  db-init:
    image: postgres:15-alpine
    container_name: aicn-db-init
    environment:
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: aicn_db
      PGHOST: postgres
    command: >
      sh -c "
        # Attendez que PostgreSQL soit prêt
        until pg_isready -h postgres -U postgres; do
          echo 'Waiting for PostgreSQL to be ready...'
          sleep 1
        done
        echo 'PostgreSQL is ready! Executing initialization script...'
        
        # Commandes d'initialisation
        psql -U postgres -d aicn_db -h postgres -c 'CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";'
        psql -U postgres -d aicn_db -h postgres -c 'CREATE SCHEMA IF NOT EXISTS ecr;'
        
        # Table users
        psql -U postgres -d aicn_db -h postgres -c 'CREATE TABLE IF NOT EXISTS users (
          id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
          email VARCHAR(255) UNIQUE NOT NULL, 
          password_hash VARCHAR(255) NOT NULL,
          name VARCHAR(255) NOT NULL,
          organization VARCHAR(255) NOT NULL,
          role VARCHAR(50) NOT NULL CHECK (role IN ('"'"'ADMIN'"'"', '"'"'USER'"'"')),
          access_rights JSONB NOT NULL DEFAULT '"'"'{"referenceIds": [], "categoryIds": []}'"'"',
          created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
          updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
        );'
        
        # Table conversations
        psql -U postgres -d aicn_db -h postgres -c 'CREATE TABLE IF NOT EXISTS conversations (
          id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
          table_id UUID NOT NULL,
          item_id VARCHAR(255) NOT NULL,
          status VARCHAR(50) NOT NULL CHECK (status IN ('"'"'OPEN'"'"', '"'"'CLOSED'"'"', '"'"'ARCHIVED'"'"')),
          created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
          updated_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
          closed_at TIMESTAMP WITH TIME ZONE,
          archived_at TIMESTAMP WITH TIME ZONE
        );'
        
        # Table messages
        psql -U postgres -d aicn_db -h postgres -c 'CREATE TABLE IF NOT EXISTS messages (
          id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
          conversation_id UUID NOT NULL REFERENCES conversations(id),
          user_id UUID NOT NULL REFERENCES users(id),
          content TEXT NOT NULL,
          created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
        );'
        
        # Index
        psql -U postgres -d aicn_db -h postgres -c 'CREATE INDEX IF NOT EXISTS idx_conversations_table_id ON conversations(table_id);'
        psql -U postgres -d aicn_db -h postgres -c 'CREATE INDEX IF NOT EXISTS idx_conversations_status ON conversations(status);'
        psql -U postgres -d aicn_db -h postgres -c 'CREATE INDEX IF NOT EXISTS idx_messages_conversation_id ON messages(conversation_id);'
        psql -U postgres -d aicn_db -h postgres -c 'CREATE INDEX IF NOT EXISTS idx_messages_user_id ON messages(user_id);'
        
        # Utilisateur admin
        psql -U postgres -d aicn_db -h postgres -c 'INSERT INTO users (email, password_hash, name, organization, role)
        VALUES (''admin@example.com'', ''bcrypt+blake2b-512$54ea933c69de0d145ef87d47c8e1a836$12$e8f22c729a5dd00d866c76a6754058b0f098d5986a3f47d9'', ''Admin'', ''AICN'', ''ADMIN'') ON CONFLICT (email) DO NOTHING;'
        
        echo 'Initialization script executed!'
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aicn-network

  # Backend Clojure application
  backend:
    build:
      context: ./packages/backend
    container_name: aicn-backend
    environment:
      PORT: 1337
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      SSL_MODE: disable
      COOLIFY_DOMAIN: yggg488g8cos0ogwkgog0oks.185.172.57.92.sslip.io
    expose:
      - "1337"
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    networks:
      - aicn-network

  # Frontend React application
  frontend:
    build:
      context: ./packages/frontend
    container_name: aicn-frontend
    environment:
      COOLIFY_DOMAIN: yggg488g8cos0ogwkgog0oks.185.172.57.92.sslip.io
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - db-init
    networks:
      - aicn-network


volumes:
  postgres-data:

networks:
  aicn-network:
    driver: bridge
